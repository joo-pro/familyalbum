services:
  postgres:
    image: postgres:17-alpine
    container_name: family-album-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-family_album}
      POSTGRES_USER: ${POSTGRES_USER:-familyalbum}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-familyalbum} -d ${POSTGRES_DB:-family_album}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    image: ${IMAGE_BACKEND}
    container_name: family-album-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-family_album}
      DATABASE_USERNAME: ${POSTGRES_USER:-familyalbum}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION:-ap-northeast-2}
      S3_BUCKET: ${S3_BUCKET}
      S3_ENDPOINT: ${S3_ENDPOINT:-https://s3.ap-northeast-2.amazonaws.com}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS}

  frontend:
    image: ${IMAGE_FRONTEND}
    container_name: family-album-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "127.0.0.1:8081:80"

volumes:
  postgres-data: