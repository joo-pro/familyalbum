spring:
  application:
    name: family-album
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  servlet:
    multipart:
      max-file-size: ${MAX_FILE_SIZE:2GB}
      max-request-size: ${MAX_REQUEST_SIZE:2GB}
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/family_album}
    username: ${DATABASE_USERNAME:joopapa}
    password: ${DATABASE_PASSWORD:joopapa}
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

server:
  port: ${SERVER_PORT:8080}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
  storage:
    provider: ${STORAGE_PROVIDER:lightsail}
    region: ${AWS_REGION:ap-northeast-2}
    bucket: ${S3_BUCKET:}
    endpoint: ${S3_ENDPOINT:https://s3.ap-northeast-2.amazonaws.com}
    upload-url-ttl: ${S3_UPLOAD_URL_TTL:PT15M}
    download-url-ttl: ${S3_DOWNLOAD_URL_TTL:PT10M}
    inline-url-ttl: ${S3_INLINE_URL_TTL:PT144H}
  push:
    vapid-public-key: ${APP_PUSH_VAPID_PUBLIC_KEY:}
    vapid-private-key: ${APP_PUSH_VAPID_PRIVATE_KEY:}
    subject: ${APP_PUSH_SUBJECT:mailto:hello@example.com}
