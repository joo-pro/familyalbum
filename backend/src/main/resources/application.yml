spring:
  application:
    name: family-album
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  servlet:
    multipart:
      max-file-size: ${MAX_FILE_SIZE:2GB}
      max-request-size: ${MAX_REQUEST_SIZE:2GB}
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/family_album}
    username: ${DATABASE_USERNAME:joopapa}
    password: ${DATABASE_PASSWORD:joopapa}
  flyway:
    enabled: true
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID:}
            client-secret: ${KAKAO_CLIENT_SECRET:}
            client-authentication-method: ${KAKAO_CLIENT_AUTH_METHOD:client_secret_post}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - profile_nickname
              - profile_image
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework
  servlet:
    session:
      timeout: 30d
      cookie:
        max-age: 30d

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
  storage:
    provider: ${STORAGE_PROVIDER:lightsail}
    region: ${AWS_REGION:ap-northeast-2}
    bucket: ${S3_BUCKET:}
    endpoint: ${S3_ENDPOINT:https://s3.ap-northeast-2.amazonaws.com}
    upload-url-ttl: ${S3_UPLOAD_URL_TTL:PT15M}
    download-url-ttl: ${S3_DOWNLOAD_URL_TTL:PT10M}
    inline-url-ttl: ${S3_INLINE_URL_TTL:PT144H}
  push:
    vapid-public-key: ${APP_PUSH_VAPID_PUBLIC_KEY:}
    vapid-private-key: ${APP_PUSH_VAPID_PRIVATE_KEY:}
    subject: ${APP_PUSH_SUBJECT:mailto:hello@example.com}
  auth:
    admin-kakao-ids: ${APP_AUTH_ADMIN_KAKAO_IDS:}
