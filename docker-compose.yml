services:
  postgres:
    image: postgres:17-alpine
    container_name: family-album-postgres
    environment:
      POSTGRES_DB: family_album
      POSTGRES_USER: joopapa
      POSTGRES_PASSWORD: joopapa
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U joopapa -d family_album"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
